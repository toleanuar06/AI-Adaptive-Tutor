<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>C++ Masterclass | AI-Tutor</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #fff; }

        .sidebar { width: 280px; background-color: #252526; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.5); z-index: 10; display: flex; flex-direction: column;}
        .sidebar h2 { color: #00ffcc; font-size: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;}
        .lesson-btn { display: block; width: 100%; text-align: left; background: none; border: none; color: #ccc; padding: 12px; margin-bottom: 5px; cursor: pointer; font-size: 15px; border-radius: 5px; transition: 0.3s;}
        .lesson-btn:hover { background-color: #333; color: #fff;}
        .lesson-btn.active { background-color: #004433; color: #00ffcc; border-left: 4px solid #00ffcc; font-weight: bold;}

        .main-content { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .theory-box { background-color: #2d2d30; padding: 25px; border-radius: 8px; border-top: 4px solid #007acc; }
        .theory-box h1 { margin-top: 0; color: #569cd6; font-size: 26px;}
        .theory-box p, .theory-box li { line-height: 1.6; font-size: 16px; color: #d4d4d4;}
        .code-example { background-color: #1e1e1e; padding: 15px; border-radius: 5px; font-family: 'Consolas', monospace; color: #ce9178; border: 1px solid #444; overflow-x: auto;}

        .practice-box { background-color: #333; padding: 20px; border-radius: 8px; border-left: 5px solid #00ffcc; }
        .practice-box h2 { margin-top: 0; color: #00ffcc; font-size: 18px;}
        textarea { width: 100%; height: 150px; background-color: #000; color: #00ff00; font-family: 'Consolas', monospace; padding: 15px; font-size: 16px; border: 1px solid #555; border-radius: 5px; box-sizing: border-box; resize: vertical;}
        button.run-btn { background-color: #00ffcc; color: #000; padding: 12px 25px; border: none; font-size: 16px; cursor: pointer; margin-top: 15px; font-weight: bold; border-radius: 5px; transition: 0.2s;}
        button.run-btn:hover { background-color: #00ccaa; transform: scale(1.02);}
        #feedback { margin-top: 20px; padding: 15px; background-color: #222; border-radius: 5px; display: none; border-left: 4px solid #ffaa00; font-size: 15px;}
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>C++ Masterclass</h2>

        <div style="background-color: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid #444;">
            <h3 style="color: #00ffcc; font-size: 15px; margin-top: 0;">👁️ AI ЭРГОНОМИКА</h3>
            <img src="/video_feed" style="width: 100%; border-radius: 5px; border: 2px solid #333;" alt="Камера жүктелуде...">
            <p style="margin: 10px 0 5px 0; font-size: 14px;">Ұпай: <strong id="health-score" style="color: #00ffcc;">100</strong></p>
            <p style="margin: 0; font-size: 14px;">Отырыс: <span id="posture-status" style="font-weight: bold; color: lime;">GOOD</span></p>
        </div>

        <div id="sidebar-menu" style="flex: 1; overflow-y: auto;">
            </div>
    </div>

    <div class="main-content">
        <div class="theory-box" id="theory-content"></div>

        <div class="practice-box">
            <h2>💻 AI-ТРЕНАЖЕР: ПРАКТИКА</h2>
            <p id="task-title" style="color: #ccc;"><i>AI тапсырма құрастыруда... Күте тұрыңыз...</i></p>
            <p id="task-desc"></p>

            <textarea id="code-editor" placeholder="C++ кодын осы жерге жазыңыз..."></textarea>
            <button class="run-btn" onclick="sendCode()">Тексеру (Run)</button>
            <div id="feedback"></div>
        </div>
    </div>

    <script>
        let currentLevel = 10;
        let currentTaskDesc = "";
        let activeLessonId = 1;

        const courseData = {
            1: { title: "1. Кіріспе: Экранға шығару", aiTopic: "C++ тілінде экранға шығару (cout)", theory: "<p>C++ тілінде экранға мәтін шығару үшін <b>std::cout</b> қолданылады.</p><div class='code-example'>#include &lt;iostream&gt;<br>using namespace std;<br>int main() { cout &lt;&lt; \"Сәлем!\" &lt;&lt; endl; return 0; }</div>" },
            2: { title: "2. Айнымалылар және Деректер", aiTopic: "C++ тіліндегі айнымалылар (int, double, string)", theory: "<p>Айнымалы (Variable) – мәліметтерді сақтайтын жад ұяшығы.</p><div class='code-example'>int age = 20;<br>double pi = 3.14;<br>cout &lt;&lt; age;</div>" },
            3: { title: "3. Математикалық операциялар", aiTopic: "C++ математикалық операторлары (+, -, *, /, %)", theory: "<p>C++ тілінде қарапайым математиканы орындауға болады.</p><div class='code-example'>int a = 10;<br>int b = 3;<br>cout &lt;&lt; a % b; // Нәтиже: 1</div>" },
            4: { title: "4. Шартты операторлар", aiTopic: "C++ if-else шартты операторлары", theory: "<p>Егер бағдарламада белгілі бір шартты тексеру қажет болса, <b>if</b> және <b>else</b> қолданамыз.</p><div class='code-example'>if (score >= 50) cout &lt;&lt; \"Өттіңіз\";</div>" },
            5: { title: "5. Циклдер (for, while)", aiTopic: "C++ тіліндегі циклдер (for loop, while loop)", theory: "<p>Бір кодты қайталау үшін циклдер қолданылады.</p><div class='code-example'>for(int i = 0; i &lt; 5; i++) cout &lt;&lt; i;</div>" }
        };

        function initSidebar() {
            let sidebarMenu = document.getElementById("sidebar-menu");
            sidebarMenu.innerHTML = "";
            for (let id in courseData) {
                let btn = document.createElement("button");
                btn.className = "lesson-btn" + (id == 1 ? " active" : "");
                btn.id = "btn-" + id;
                btn.innerText = courseData[id].title;
                btn.onclick = () => loadLesson(id);
                sidebarMenu.appendChild(btn);
            }
        }

        function loadLesson(lessonId) {
            document.querySelectorAll('.lesson-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lessonId).classList.add('active');
            activeLessonId = lessonId;

            document.getElementById('theory-content').innerHTML = `<h1>${courseData[lessonId].title}</h1>${courseData[lessonId].theory}`;
            document.getElementById("code-editor").value = "";
            document.getElementById("feedback").style.display = "none";
            fetchNewTask();
        }

        async function fetchNewTask() {
            document.getElementById("task-title").innerHTML = "<i>AI жаңа тапсырма құрастыруда...</i>";
            document.getElementById("task-desc").innerHTML = "";
            document.getElementById("feedback").style.display = "none";

            try {
                let response = await fetch('/get_task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: courseData[activeLessonId].aiTopic, level: currentLevel })
                });
                let data = await response.json();
                currentTaskDesc = data.desc;
                document.getElementById("task-title").innerText = "ТАПСЫРМА:";
                document.getElementById("task-desc").innerHTML = "<b>" + data.desc + "</b><br><br><span style='color: #888;'><i>Көмек: " + data.hint + "</i></span>";
            } catch(e) {
                document.getElementById("task-title").innerText = "Қате шықты!";
            }
        }

        async function sendCode() {
            let code = document.getElementById("code-editor").value;
            let feedback = document.getElementById("feedback");
            feedback.style.display = "block";
            feedback.innerHTML = "<i>Код компиляциялануда... Күте тұрыңыз...</i>";

            let response = await fetch('/run_code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, task_desc: currentTaskDesc })
            });
            let result = await response.json();

            if (result.status === "success") {
                feedback.innerHTML = "<span style='color: #00ffcc;'>" + result.message + "</span>";
                currentLevel += 10;
                setTimeout(fetchNewTask, 3500);
            } else {
                feedback.innerHTML = "<span style='color: #ff4444;'>[ҚАТЕ]:</span> " + result.message;
            }
        }

        // Камера ұпайын тексеру
        setInterval(async () => {
            try {
                let res = await fetch('/get_score');
                let data = await res.json();
                document.getElementById('health-score').innerText = data.score;
                let postureEl = document.getElementById('posture-status');
                postureEl.innerText = data.posture;
                postureEl.style.color = data.posture.includes("BAD") ? "#ff4444" : "lime";
            } catch (e) {}
        }, 1000);

        window.onload = () => {
            initSidebar();
            loadLesson(1);
        };
    </script>
</body>
</html>
